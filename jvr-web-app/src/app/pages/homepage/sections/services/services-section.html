<section id="services" class="services-section">
  <div class="section-inner">

    <app-section-header
      class="mb-6"
      label="What We Do"
      sub="We work across the full development stack — from frontend to cloud — with focused expertise in the technologies that power enterprise systems."
    >
      Our Core Capabilities
    </app-section-header>

    <div class="grid">
      @for (service of services; track service.title) {
        <div class="col-12 md:col-6 lg:col-4 flex">
          <p-card styleClass="service-card w-full">
            <div [class]="'svc-icon accent-' + service.iconColor">{{ service.icon }}</div>
            <h3 class="svc-title">{{ service.title }}</h3>
            <p class="svc-desc">{{ service.description }}</p>
            <a routerLink="/services" class="svc-link">Learn more →</a>
          </p-card>
        </div>
      }
    </div>

  </div>
</section>
